<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WalkRoid</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #ffffff;
  color: #222;
}

/* ナビゲーション */
.navbar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px 30px;
  display: flex;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  color: white;
  font-weight: bold;
  font-size: 18px;
  text-decoration: none;
}

.logo img {
  height: 30px;
  margin-right: 10px;
}

/* ヘッダー */
.hero {
  text-align: center;
  padding: 140px 20px 120px;
  background: linear-gradient(135deg, #00C853, #0091EA);
  color: white;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  font-size: 18px;
  opacity: 0.9;
}

/* CTA */
.cta {
  display: inline-block;
  margin-top: 30px;
  padding: 15px 30px;
  background: linear-gradient(135deg, #00C853, #0091EA);
  color: white;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(0, 145, 234, 0.3);
}

/* セクション */
section {
  padding: 80px 20px;
  max-width: 1000px;
  margin: auto;
}

h2 {
  margin-bottom: 20px;
}

/* スクショ */
.screens {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

.screens img {
  width: 200px;
  border-radius: 20px;
}

/* 特徴 */
.features {
  display: grid;
  gap: 20px;
}

.feature {
  padding: 25px;
  border-radius: 16px;
  background: #f4f9fb;
}

@media (min-width: 700px) {
  .features {
    grid-template-columns: 1fr 1fr;
  }
}

/* CTA下部 */
.cta-section {
  text-align: center;
  background: linear-gradient(135deg, #E0F7FA, #E8F5E9);
  padding: 100px 20px;
}

/* フッター */
footer {
  text-align: center;
  padding: 40px 20px;
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>

<!-- ナビゲーション -->
<div class="navbar">
  <a href="http://www.angolasystem.com" class="logo">
    <img src="logo.png" alt="logo">
    Angola System,LLC
  </a>
</div>

<!-- ヘッダー -->
<section class="hero">
  <h1>WalkRoid</h1>
  <p>現在開発中のウォーキング支援モバイルアプリ</p>

  <a href="#" class="cta">App Store公開予定</a>
</section>

<!-- スクショ -->
<section>
  <h2>アプリ画面（開発中）</h2>
  <div class="screens">
    <img src="screen1.png">
    <img src="screen2.png">
    <img src="screen3.png">
  </div>
</section>

<!-- 説明 -->
<section>
  <h2>WalkRoidについて</h2>
  <p>
    WalkRoidは、日々のウォーキングを可視化し、習慣化をサポートするモバイルアプリです。現在開発中です。
  </p>
</section>

<!-- 機能 -->
<section>
  <h2>主な機能（予定）</h2>
  <div class="features">
    <div class="feature">歩数・距離の自動記録</div>
    <div class="feature">シンプルで使いやすいUI</div>
    <div class="feature">履歴の可視化</div>
    <div class="feature">継続しやすい設計</div>
  </div>
</section>

<!-- CTA -->
<section class="cta-section">
  <h2>公開をお待ちください</h2>
  <a href="#" class="cta">近日公開予定</a>
</section>

<!-- フッター -->
<footer>
  © 2026 Angola System,LLC<br>
  自社モバイルアプリの企画・開発・運営
</footer>

</body>
</html>
